name: Validate SKILL.md

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check SKILL.md exists
        run: |
          if [ ! -f "SKILL.md" ]; then
            echo "ERROR: SKILL.md not found"
            exit 1
          fi
          echo "✅ SKILL.md exists"

      - name: Check frontmatter
        run: |
          if ! grep -q "^name:" SKILL.md; then
            echo "ERROR: Missing 'name' in frontmatter"
            exit 1
          fi
          if ! grep -q "^description:" SKILL.md; then
            echo "ERROR: Missing 'description' in frontmatter"
            exit 1
          fi
          echo "✅ Frontmatter OK"

      - name: Check references directory
        run: |
          if [ ! -d "references" ]; then
            echo "ERROR: references/ directory not found"
            exit 1
          fi
          echo "✅ references/ OK"

      - name: Check required reference files
        run: |
          files=("references/skill-template.md" "references/audit-checklist.md" "references/pipeline-log.md")
          for f in "${files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "ERROR: Required file $f not found"
              exit 1
            fi
          done
          echo "✅ All required reference files present"

      - name: Check no personal info
        run: |
          # Check for common personal info patterns
          if grep -rn "api_key\s*=\s*['\"].\+['\"]" . --include="*.md" --include="*.py"; then
            echo "ERROR: Potential API key found"
            exit 1
          fi
          echo "✅ No personal info detected"
