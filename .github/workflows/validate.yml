name: Validate SKILL.md

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check SKILL.md exists
        run: |
          if [ ! -f "SKILL.md" ]; then
            echo "ERROR: SKILL.md not found"
            exit 1
          fi
          echo "SKILL.md found"

      - name: Validate frontmatter
        run: |
          if ! grep -q "^name:" SKILL.md; then
            echo "ERROR: SKILL.md missing 'name' field in frontmatter"
            exit 1
          fi
          if ! grep -q "^description:" SKILL.md; then
            echo "ERROR: SKILL.md missing 'description' field in frontmatter"
            exit 1
          fi
          if ! grep -q "^version:" SKILL.md; then
            echo "ERROR: SKILL.md missing 'version' field in frontmatter"
            exit 1
          fi
          echo "Frontmatter validation passed"

      - name: Validate structure
        run: |
          REQUIRED_STAGES=5
          STAGE_COUNT=$(grep -c "^### Stage" SKILL.md || echo "0")
          if [ "$STAGE_COUNT" -lt "$REQUIRED_STAGES" ]; then
            echo "ERROR: Expected at least $REQUIRED_STAGES Stage sections, found $STAGE_COUNT"
            exit 1
          fi
          echo "Stage structure validation passed ($STAGE_COUNT stages)"

      - name: Validate no hardcoded paths
        run: |
          HARDCODED=$(grep -n "C:\\\\Users\\\\" SKILL.md || true)
          if [ -n "$HARDCODED" ]; then
            echo "ERROR: Hardcoded Windows user paths found:"
            echo "$HARDCODED"
            exit 1
          fi
          echo "No hardcoded paths found"

      - name: Validate references exist
        run: |
          for ref in $(grep -oE '\[references/[^]]+\.md\]' SKILL.md | tr -d '[]' | sed 's/references\///'); do
            if [ ! -f "references/$ref" ]; then
              echo "ERROR: Referenced file 'references/$ref' does not exist"
              exit 1
            fi
          done
          echo "All references validated"
